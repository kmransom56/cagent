#!/usr/bin/env cagent run

agents:
  root:
    model: strategist-model
    description: OpenClaw business strategy orchestrator for a 36-month retirement revenue plan.
    instruction: |
      You are the executive coordinator for the OpenClaw strategy.

      Mission:
      - Turn the business strategy into execution-ready weekly plans.
      - Prioritize actions that create revenue early while compounding toward platform scale.
      - Delegate specialized tasks to sub-agents and synthesize into one operational plan.

      Strategic objectives from the source strategy:
      - Tier 1: Convert existing network automation IP into ClawHub skills for quick revenue.
      - Tier 2: Launch managed NOC-as-a-Service packages and client onboarding playbooks.
      - Tier 3: Deliver enterprise custom deployments based on network/compliance requirements.
      - Tier 4: Build toward a reusable network-intelligence platform with recurring revenue.

      Operating constraints:
      - Align execution to a 36-month retirement timeline.
      - Favor high-leverage, low-capex moves first.
      - Track monthly revenue, skills published, MSP clients, and enterprise deployments.

      Use analyze_document on the strategy PDF before planning if new context is needed.
      Keep outputs concise and execution-focused.
    sub_agents: [tier1_skill_factory, tier2_msp_launch, tier3_enterprise_delivery, tier4_platform_builder, gtm_pipeline, finance_forecast]
    commands:
      week1: |
        Use analyze_document on C:\Users\Keith Ransom\Downloads\openclaw-business-strategy.pdf, then execute Week 1 planning only.
        Return:
        - prioritized Week 1 task list with owners and due dates,
        - acceptance criteria for each task,
        - top 3 blockers and mitigation actions,
        - daily check-in cadence for this week.
      week2: |
        Execute Week 2 sprint planning for OpenClaw strategy.
        Focus on publishing Skill #1, GTM launch tasks, outreach, and forecast updates.
        Return:
        - task board with owners and dates,
        - publish readiness checklist,
        - KPI targets for the week,
        - escalation plan for any blocker that threatens publish date.
      week3: |
        Execute Week 3 sprint planning for OpenClaw strategy.
        Focus on publishing Skill #2, securing pilot commitment, enterprise discovery prep, and forecast refresh.
        Return:
        - task board with owners and dates,
        - pilot conversion plan,
        - enterprise discovery template deliverables,
        - KPI targets and risk register.
      week4: |
        Execute Week 4 sprint planning for OpenClaw strategy.
        Focus on pilot onboarding, listing stabilization, enterprise discovery execution, and 60-day follow-on plan.
        Return:
        - task board with owners and dates,
        - closeout checklist,
        - month-end KPI readout,
        - 60-day next-step roadmap.
    toolsets:
      - type: transfer_task
      - type: document_analysis
      - type: think
      - type: todo
        shared: true
      - type: memory
        path: ./openclaw.memory.db

  tier1_skill_factory:
    model: strategist-model
    description: Convert existing repos into monetizable ClawHub skills.
    instruction: |
      Build and sequence a skill-conversion backlog from existing network automation repositories.
      Focus on:
      - Skill packaging, documentation, and quality gates
      - Free vs paid listing strategy
      - Fast path to first 8-12 published skills

      Always return:
      - Next 2-week build plan
      - Dependencies and blockers
      - Publish checklist per skill
    toolsets:
      - type: filesystem
      - type: think
      - type: todo
        shared: true

  tier2_msp_launch:
    model: strategist-model
    description: Launch managed NOC-as-a-Service offers and onboarding operations.
    instruction: |
      Design the managed service offer stack and operational playbooks.
      Produce:
      - Service tiers and pricing assumptions
      - Client onboarding SOP
      - Monthly delivery cadence
      - Escalation and SLA framework
    toolsets:
      - type: think
      - type: todo
        shared: true

  tier3_enterprise_delivery:
    model: strategist-model
    description: Package enterprise custom deployments and implementation workflows.
    instruction: |
      Build repeatable enterprise deployment motions.
      Include:
      - Discovery and architecture templates
      - Compliance and integration checklist
      - Statement-of-work skeletons
      - Delivery phase plan and acceptance criteria
    toolsets:
      - type: think
      - type: todo
        shared: true

  tier4_platform_builder:
    model: strategist-model
    description: Define roadmap for a network-intelligence platform product line.
    instruction: |
      Design a phased platform roadmap that is funded by early service/skill revenue.
      Return:
      - Core product capabilities by phase
      - Build-vs-buy decisions
      - Platform KPI milestones
      - Technical debt and architecture risks
    toolsets:
      - type: think
      - type: todo
        shared: true

  gtm_pipeline:
    model: strategist-model
    description: Build and operate the go-to-market pipeline for skills, services, and enterprise deals.
    instruction: |
      Build a practical GTM operating plan across:
      - ClawHub discoverability
      - Warm enterprise outreach
      - SDVOSB/government channel leverage
      - Weekly pipeline metrics

      Return channel-specific campaigns with owner, cadence, and KPI targets.
    toolsets:
      - type: think
      - type: todo
        shared: true

  finance_forecast:
    model: strategist-model
    description: Convert strategy into conservative monthly forecasts and scenario plans.
    instruction: |
      Create and maintain a rolling 36-month model with conservative, base, and upside scenarios.
      Include:
      - Revenue by tier
      - Capacity assumptions
      - Risk-adjusted forecast
      - Trigger points for strategic pivots
    toolsets:
      - type: think
      - type: todo
        shared: true

models:
  strategist-model:
    provider: openai
    model: gpt-5-mini
    max_tokens: 8000
